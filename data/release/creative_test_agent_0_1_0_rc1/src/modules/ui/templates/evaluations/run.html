{% extends "base.html" %}
{% block title %}Run Evaluation — Creative Test Agent{% endblock %}
{% block content %}
<div class="page-header"><h1>Run Evaluation</h1></div>
{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}
<div class="card">
  <form method="post" action="/ui/evaluations/run">
    <div class="form-group">
      <label for="profile_id">Model Profile (optional — defaults to stub)</label>
      <select name="profile_id" id="profile_id">
        <option value="">-- Stub (default) --</option>
        {% for p in profiles %}
        <option value="{{ p.id }}">{{ p.profile_name }} ({{ p.provider }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="case_ids">Test Cases</label>
      <select name="case_ids" id="case_ids" multiple size="6">
        {% for c in cases %}
        <option value="{{ c.case_id }}" selected>{{ c.title }}</option>
        {% endfor %}
      </select>
      <div class="form-help">Hold Ctrl/Cmd to select multiple. Default: all cases.</div>
    </div>
    <button type="submit" class="btn btn-primary">Run Evaluation</button>
    <a href="/ui/evaluations" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
