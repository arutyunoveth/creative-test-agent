{% extends "base.html" %}
{% block title %}New Audience Profile — Creative Test Agent{% endblock %}
{% block content %}

<div class="page-header"><h1>New Audience Profile</h1></div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
  <form method="post" action="/ui/audience-profiles">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" name="name" id="name" required>
    </div>
    <div class="form-group">
      <label for="segment_description">Segment Description</label>
      <textarea name="segment_description" id="segment_description" rows="3" required placeholder="Describe this audience segment"></textarea>
    </div>
    <div class="form-group">
      <label for="pains">Pains</label>
      <textarea name="pains" id="pains" rows="3" placeholder="What pain points does this audience have?"></textarea>
    </div>
    <div class="form-group">
      <label for="motivations">Motivations</label>
      <textarea name="motivations" id="motivations" rows="3" placeholder="What motivates this audience?"></textarea>
    </div>
    <div class="form-group">
      <label for="objections">Objections</label>
      <textarea name="objections" id="objections" rows="3" placeholder="Common objections from this audience"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Create</button>
    <a href="/ui/audience-profiles" class="btn btn-secondary">Cancel</a>
  </form>
</div>

{% endblock %}
