version: "3.9"

services:
  creative-test-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cta-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/db:/app/data/db
      - ./data/storage:/app/data/storage
      - ./data/exports:/app/data/exports
      - ./data/backups:/app/data/backups
