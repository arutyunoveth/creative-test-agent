{% extends "base.html" %}
{% block content %}
<h2>New User</h2>
{% if error %}
<div style="padding:0.75rem; background:#ffebee; border-radius:4px; margin-bottom:1rem;">{{ error }}</div>
{% endif %}
<form method="POST" action="/ui/users">
  <div style="margin-bottom:0.75rem;">
    <label>Email:</label><br>
    <input type="email" name="email" required style="width:100%; max-width:400px;">
  </div>
  <div style="margin-bottom:0.75rem;">
    <label>Display Name:</label><br>
    <input type="text" name="display_name" required style="width:100%; max-width:400px;">
  </div>
  <div style="margin-bottom:0.75rem;">
    <label>Password:</label><br>
    <input type="password" name="password" required style="width:100%; max-width:400px;">
  </div>
  <div style="margin-bottom:0.75rem;">
    <label>Role:</label><br>
    <select name="role">
      {% for r in roles %}
      <option value="{{ r.value }}">{{ r.value }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit">Create User</button>
</form>
{% endblock %}
