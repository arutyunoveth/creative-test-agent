{% extends "base.html" %}
{% block content %}
<h2>Users</h2>
<a href="/ui/users/new"><button>New User</button></a>
<table>
  <thead>
    <tr>
      <th>Email</th>
      <th>Name</th>
      <th>Role</th>
      <th>Active</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
  {% for u in users %}
    <tr>
      <td>{{ u.email }}</td>
      <td>{{ u.display_name }}</td>
      <td>{{ u.role }}</td>
      <td>{{ '✓' if u.is_active else '✗' }}</td>
      <td><a href="/ui/users/{{ u.id }}">detail</a></td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
