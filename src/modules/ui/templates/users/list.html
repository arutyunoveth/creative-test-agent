{% extends "base.html" %}
{% block content %}
<h2>{{ t("Users") }}</h2>
<a href="/ui/users/new"><button>{{ t("New User") }}</button></a>
<table>
  <thead>
    <tr>
      <th>{{ t("Email") }}</th>
      <th>{{ t("Name") }}</th>
      <th>{{ t("Role") }}</th>
      <th>{{ t("Active") }}</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
  {% for u in users %}
    <tr>
      <td>{{ u.email }}</td>
      <td>{{ u.display_name }}</td>
      <td>{{ u.role }}</td>
      <td>{{ '✓' if u.is_active else '✗' }}</td>
      <td><a href="/ui/users/{{ u.id }}">{{ t("detail") }}</a></td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
