{% extends "base.html" %}
{% block title %}New Client — Creative Test Agent{% endblock %}
{% block content %}
<div class="page-header"><h1>New Client</h1></div>
{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}
<div class="card">
  <form method="post" action="/ui/clients">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" name="name" id="name" required>
    </div>
    <div class="form-group">
      <label for="industry">Industry</label>
      <input type="text" name="industry" id="industry" placeholder="e.g. Finance, Healthcare">
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea name="description" id="description" rows="3" placeholder="Client description..."></textarea>
    </div>
    <div class="form-group">
      <label for="contact_name">Contact Name</label>
      <input type="text" name="contact_name" id="contact_name" placeholder="Primary contact">
    </div>
    <div class="form-group">
      <label for="contact_email">Contact Email</label>
      <input type="email" name="contact_email" id="contact_email" placeholder="contact@example.com">
    </div>
    <button type="submit" class="btn btn-primary">Create Client</button>
    <a href="/ui/clients" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
