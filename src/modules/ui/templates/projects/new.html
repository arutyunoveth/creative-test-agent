{% extends "base.html" %}
{% block title %}{{ t("New Project") }} — {{ t("Creative Test Agent") }}{% endblock %}
{% block content %}
<div class="page-header"><h1>{{ t("New Project") }}</h1></div>
{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}
<div class="card">
  <form method="post" action="/ui/projects">
    {% if client_id %}
    <input type="hidden" name="client_id" value="{{ client_id }}">
    {% else %}
    <div class="form-group">
      <label for="client_id">{{ t("Client") }}</label>
      <select name="client_id" id="client_id" required>
        <option value="">-- {{ t("Select Client") }} --</option>
        {% for c in clients %}
        <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>
    {% endif %}
    <div class="form-group">
      <label for="name">{{ t("Project Name") }}</label>
      <input type="text" name="name" id="name" required placeholder="{{ t("e.g. Summer Campaign 2026") }}">
    </div>
    <div class="form-group">
      <label for="description">{{ t("Description") }}</label>
      <textarea name="description" id="description" rows="3" placeholder="{{ t("Project description...") }}"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">{{ t("Create Project") }}</button>
    <a href="/ui/projects" class="btn btn-secondary">{{ t("Cancel") }}</a>
  </form>
</div>
{% endblock %}
