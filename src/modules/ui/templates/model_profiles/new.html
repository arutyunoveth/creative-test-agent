{% extends "base.html" %}
{% block title %}{{ t("New Model Profile") }} — {{ t("Creative Test Agent") }}{% endblock %}
{% block content %}
<div class="page-header"><h1>{{ t("New Model Profile") }}</h1></div>
{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}
<div class="card">
  <form method="post" action="/ui/model-profiles">
    <div class="form-group">
      <label for="profile_name">{{ t("Profile Name") }}</label>
      <input type="text" name="profile_name" id="profile_name" required placeholder="{{ t("e.g. ollama-local") }}">
    </div>
    <div class="form-group">
      <label for="provider">{{ t("Provider") }}</label>
      <select name="provider" id="provider" required>
        <option value="stub">{{ t("stub") }}</option>
        <option value="ollama">{{ t("ollama") }}</option>
        <option value="lmstudio">{{ t("lmstudio") }}</option>
      </select>
    </div>
    <div class="form-group">
      <label for="model">{{ t("Model Name") }}</label>
      <input type="text" name="model" id="model" required placeholder="{{ t("e.g. qwen2.5:7b") }}">
    </div>
    <div class="form-group">
      <label for="base_url">{{ t("Base URL (for local providers)") }}</label>
      <input type="text" name="base_url" id="base_url" placeholder="{{ t("http://localhost:11434") }}">
    </div>
    <div class="form-group">
      <label for="timeout_seconds">{{ t("Timeout (seconds)") }}</label>
      <input type="number" name="timeout_seconds" id="timeout_seconds" value="120">
    </div>
    <div class="form-group">
      <label for="notes">{{ t("Notes") }}</label>
      <textarea name="notes" id="notes" rows="2" placeholder="{{ t("Optional description...") }}"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">{{ t("Create Profile") }}</button>
    <a href="/ui/model-profiles" class="btn btn-secondary">{{ t("Cancel") }}</a>
  </form>
</div>
{% endblock %}
