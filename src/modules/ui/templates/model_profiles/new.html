{% extends "base.html" %}
{% block title %}New Model Profile — Creative Test Agent{% endblock %}
{% block content %}
<div class="page-header"><h1>New Model Profile</h1></div>
{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}
<div class="card">
  <form method="post" action="/ui/model-profiles">
    <div class="form-group">
      <label for="profile_name">Profile Name</label>
      <input type="text" name="profile_name" id="profile_name" required placeholder="e.g. ollama-local">
    </div>
    <div class="form-group">
      <label for="provider">Provider</label>
      <select name="provider" id="provider" required>
        <option value="stub">stub</option>
        <option value="ollama">ollama</option>
        <option value="lmstudio">lmstudio</option>
      </select>
    </div>
    <div class="form-group">
      <label for="model">Model Name</label>
      <input type="text" name="model" id="model" required placeholder="e.g. qwen2.5:7b">
    </div>
    <div class="form-group">
      <label for="base_url">Base URL (for local providers)</label>
      <input type="text" name="base_url" id="base_url" placeholder="http://localhost:11434">
    </div>
    <div class="form-group">
      <label for="timeout_seconds">Timeout (seconds)</label>
      <input type="number" name="timeout_seconds" id="timeout_seconds" value="120">
    </div>
    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea name="notes" id="notes" rows="2" placeholder="Optional description..."></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Create Profile</button>
    <a href="/ui/model-profiles" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
