{% extends "base.html" %}
{% block title %}{{ t("New Brand Profile") }} — {{ t("Creative Test Agent") }}{% endblock %}
{% block content %}

<div class="page-header"><h1>{{ t("New Brand Profile") }}</h1></div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
  <form method="post" action="/ui/brand-profiles">
    <div class="form-group">
      <label for="name">{{ t("Name") }}</label>
      <input type="text" name="name" id="name" required>
    </div>
    <div class="form-group">
      <label for="tone_of_voice">{{ t("Tone of Voice") }}</label>
      <textarea name="tone_of_voice" id="tone_of_voice" rows="3" placeholder='{{ t("e.g. professional, friendly, authoritative") }}'></textarea>
    </div>
    <div class="form-group">
      <label for="target_audience">{{ t("Target Audience") }}</label>
      <textarea name="target_audience" id="target_audience" rows="3" placeholder="{{ t("Describe the brand's target audience") }}"></textarea>
    </div>
    <div class="form-group">
      <label for="restrictions">{{ t("Restrictions") }}</label>
      <textarea name="restrictions" id="restrictions" rows="3" placeholder='{{ t("e.g. no religious references, no competitor mentions") }}'></textarea>
    </div>
    <div class="form-group">
      <label for="claims_policy">{{ t("Claims Policy") }}</label>
      <textarea name="claims_policy" id="claims_policy" rows="3" placeholder='{{ t("e.g. all claims must be substantiated") }}'></textarea>
    </div>
    <button type="submit" class="btn btn-primary">{{ t("Create") }}</button>
    <a href="/ui/brand-profiles" class="btn btn-secondary">{{ t("Cancel") }}</a>
  </form>
</div>

{% endblock %}
