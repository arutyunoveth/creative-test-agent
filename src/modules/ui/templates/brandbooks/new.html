{% extends "base.html" %}
{% block title %}{{ t("Upload Brandbook") }} — {{ t("Creative Test Agent") }}{% endblock %}
{% block content %}

<div class="page-header"><h1>{{ t("Upload Brandbook Document") }}</h1></div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
  <form method="POST" action="/ui/brandbooks" enctype="multipart/form-data">
    <div class="form-group">
      <label>{{ t("Title (optional)") }}</label>
      <input type="text" name="title" class="form-control" placeholder="{{ t("Defaults to filename") }}">
    </div>
    <div class="form-group">
      <label>{{ t("Document Type") }}</label>
      <select name="document_type" class="form-control">
        <option value="brandbook">{{ t("Brandbook") }}</option>
        <option value="tone_of_voice">{{ t("Tone of Voice") }}</option>
        <option value="claims_policy">{{ t("Claims Policy") }}</option>
        <option value="legal_guidelines">{{ t("Legal Guidelines") }}</option>
        <option value="campaign_brief">{{ t("Campaign Brief") }}</option>
        <option value="other">{{ t("Other") }}</option>
      </select>
    </div>
    <div class="form-group">
      <label>{{ t("File (.txt, .md, .pdf)") }}</label>
      <input type="file" name="file" class="form-control" required accept=".txt,.md,.pdf">
    </div>
    <div class="form-group">
      <label>{{ t("Brand Profile ID (optional)") }}</label>
      <input type="text" name="brand_profile_id" class="form-control" placeholder="{{ t("Link to brand profile") }}">
    </div>
    <div class="form-group">
      <label>{{ t("Client ID (optional)") }}</label>
      <input type="text" name="client_id" class="form-control" placeholder="{{ t("Client identifier") }}">
    </div>
    <div class="form-group">
      <label>{{ t("Project ID (optional)") }}</label>
      <input type="text" name="project_id" class="form-control" placeholder="{{ t("Project identifier") }}">
    </div>
    <button type="submit" class="btn btn-primary">{{ t("Upload") }}</button>
    <a href="/ui/brandbooks" class="btn btn-secondary">{{ t("Cancel") }}</a>
  </form>
</div>

{% endblock %}
