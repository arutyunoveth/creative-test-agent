{% extends "base.html" %}
{% block title %}{{ t("New Review") }} — {{ t("Creative Test Agent") }}{% endblock %}
{% block content %}

<div class="page-header"><h1>{{ t("New Review") }}</h1></div>

<div class="card">
  <form method="POST" action="/ui/reviews">
    <div class="form-field">
      <label>{{ t("Creative Asset ID") }}</label>
      <input type="text" name="creative_asset_id" value="{{ asset_id or '' }}" required />
    </div>
    <div class="form-field">
      <label>{{ t("Report ID (optional)") }}</label>
      <input type="text" name="report_id" value="{{ report_id or '' }}" />
    </div>
    <div class="form-field">
      <label>{{ t("Reviewer Name") }}</label>
      <input type="text" name="reviewer" value="system" />
    </div>
    <div class="form-field">
      <label>{{ t("Decision") }}</label>
      <select name="decision">
        <option value="">{{ t("-- None --") }}</option>
        <option value="approve">{{ t("Approve") }}</option>
        <option value="revise">{{ t("Revise") }}</option>
        <option value="reject">{{ t("Reject") }}</option>
        <option value="needs_discussion">{{ t("Needs Discussion") }}</option>
      </select>
    </div>
    <div class="form-field">
      <label>{{ t("Rating (1-5)") }}</label>
      <input type="number" name="rating" min="1" max="5" />
    </div>
    <div class="form-field">
      <label>{{ t("Summary") }}</label>
      <textarea name="summary" rows="3"></textarea>
    </div>
    <div class="form-field">
      <label>{{ t("Strengths") }}</label>
      <textarea name="strengths" rows="3"></textarea>
    </div>
    <div class="form-field">
      <label>{{ t("Concerns") }}</label>
      <textarea name="concerns" rows="3"></textarea>
    </div>
    <div class="form-field">
      <label>{{ t("Revision Requests") }}</label>
      <textarea name="revision_requests" rows="3"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">{{ t("Create Review") }}</button>
    <a href="/ui/reviews" class="btn btn-secondary">{{ t("Cancel") }}</a>
  </form>
</div>

{% if error %}
<div class="card" style="margin-top:1rem;border-color:#e53935;">
  <p style="color:#e53935;">{{ error }}</p>
</div>
{% endif %}

{% endblock %}
