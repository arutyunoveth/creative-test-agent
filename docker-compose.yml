version: "3.9"

services:
  api:
    build: .
    ports:
      - "${CTA_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      CTA_DATABASE_URL: sqlite:///data/creative_test_agent.db
      CTA_LOCAL_ONLY_MODE: "true"
      CTA_ALLOW_CLOUD_LLM: "false"
      CTA_LLM_PROVIDER: stub
      CTA_VISION_PROVIDER: stub
      CTA_ENABLE_AUTH: "false"
      CTA_ENABLE_PROJECTS: "false"
      CTA_ENABLE_BRANDBOOKS: "false"
      CTA_ENABLE_ADVANCED_EXPORTS: "false"
      CTA_STORAGE_ROOT: /app/data/storage
    volumes:
      - cta_data:/app/data
    restart: unless-stopped

volumes:
  cta_data:
